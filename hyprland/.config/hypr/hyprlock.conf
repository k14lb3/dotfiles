$FONT_FAMILY = SauceCodePro Nerd Font Mono
$BACKGROUND_COLOR = rgb(22, 22, 22)
$FOREGROUND_COLOR = rgb(242, 244, 248)
$BORDER_COLOR = rgb(123, 124, 126)
$ERROR_COLOR = rgb(238, 83, 150)

general {
    hide_cursor = true
}

background {
    monitor =
    color = $BACKGROUND_COLOR
    blur_passes = 0
}

label {
    monitor =
    text = cmd[update:30000] echo "$(date +"%R")"
    font_family = $FONT_FAMILY
    color = $FOREGROUND_COLOR
    font_size = 120
    position = 8, 0
    halign = left
    valign = top
}

label {
    monitor = 
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    font_family = $FONT_FAMILY
    color = $FOREGROUND_COLOR
    font_size = 24
    position = 24, -174
    halign = left
    valign = top
}

input-field {
    monitor =
    size = 360, 72
    placeholder_text =
    rounding = 0
    outline_thickness = 2
    font_color = $FOREGROUND_COLOR
    inner_color = $BACKGROUND_COLOR
    check_color = $BORDER_COLOR
    outer_color = $BORDER_COLOR
    fail_color = $ERROR_COLOR
    fail_text = Incorrect password.
    fade_on_empty = false
    position = 0, 0
    halign = center
    valign = center
}
