# Default configuration : https://github.com/alacritty/alacritty/blob/master/alacritty.yml

env:
  TERM: alacritty

window:
  padding:
    x: 4 
    y: 4
  decorations: full
  opacity: 0.90
  title: Alacritty
  dynamic_title: false

scrolling:
  history: 10000

# Source Code Pro
# https://github.com/ryanoasis/nerd-fonts/tree/master/patched-fonts/SourceCodePro
font:
  normal:
    family: SauceCodePro NF
    style: Medium
  bold:
    family: SauceCodePro NF
    style: Bold
  italic:
    family: SauceCodePro NF
    style: Medium Italic
  bold_italic:
    family: SauceCodePro NF
    style: Bold Italic

  size: 11.0

# TokyoNight
# https://github.com/folke/tokyonight.nvim/blob/main/extras/alacritty_tokyonight_night.yml
colors:
  primary:
    background: '0x1a1b26'
    foreground: '0xc0caf5'
  normal:
    black:   '0x15161E'
    red:     '0xf7768e'
    green:   '0x9ece6a'
    yellow:  '0xe0af68'
    blue:    '0x7aa2f7'
    magenta: '0xbb9af7'
    cyan:    '0x7dcfff'
    white:   '0xa9b1d6'
  bright:
    black:   '0x414868'
    red:     '0xf7768e'
    green:   '0x9ece6a'
    yellow:  '0xe0af68'
    blue:    '0x7aa2f7'
    magenta: '0xbb9af7'
    cyan:    '0x7dcfff'
    white:   '0xc0caf5'
  indexed_colors:
    - { index: 16, color: '0xff9e64' }
    - { index: 17, color: '0xdb4b4b' }

shell:
  program: 'C:/Windows/System32/wsl.exe ~'
  args:
    - 'tmux attach || tmux'

key_bindings:
  - { key: Space, mods: Control, chars: "\x00" }
